<!DOCTYPE html>
<html>
<head>
  <title>Live Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: 0.3s;
    }

    /* THEMES */
    body.dark {
      background: #0f172a;
      color: white;
    }

    body.light {
      background: #f1f5f9;
      color: black;
    }

    body.neon {
      background: black;
      color: #39ff14;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #111827;
      color: white;
    }

    .controls {
      padding: 10px;
    }

    input {
      padding: 8px;
      width: 250px;
      font-size: 16px;
    }

    .ticker {
      height: calc(100vh - 120px);
      overflow-y: auto;
      padding: 10px;
    }

    .item {
      font-size: 50px;
      padding: 10px;
      margin: 6px 0;
      border-bottom: 1px solid currentColor;

      /* 🔥 IMPORTANT: single line */
      white-space: nowrap;
    }

    .small {
      font-size: 50px;
    }

    button {
      margin-left: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body class="dark">

<header>
  <div>📡 Live Dashboard</div>

  <div>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('neon')">Neon</button>
  </div>
</header>

<div class="controls">
  🔎 <input id="search" placeholder="Search..." onkeyup="render()" />
</div>

<div class="ticker">
  <div id="feed"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx5H1nE9qRgtuvNfEeJZ6GUqnFP9_59sLObLB1FrOZXryB5VwZoaA4EcKkzGE0JaX3f8A/exec";

let rows = [];

function setTheme(t) {
  document.body.className = t;
}

function getOnlyTime(value) {
  if (!value) return "";

  const d = new Date(value);
  if (isNaN(d)) return value;

  return d.toLocaleTimeString(); // only time
}

async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const json = await res.json();

    rows = json.rows || [];

    render();

  } catch (err) {
    console.error("API ERROR:", err);
  }
}

function render() {

  const q = document.getElementById("search").value.toLowerCase();
  const feed = document.getElementById("feed");

  let filtered = rows.filter(r =>
    (r || []).join(" ").toLowerCase().includes(q)
  );

  feed.innerHTML = "";

  filtered.forEach(r => {

    const name = r[1] || "";
    const cls = r[2] || "";
    const status = r[3] || "";
    const time = getOnlyTime(r[4]);

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      ${name} | ${cls} | ${status} | ${time}
    `;

    feed.appendChild(div);
  });
}

fetchData();

/* 🔥 1.3 second refresh */
setInterval(fetchData, 1300);

</script>

</body>
</html>
