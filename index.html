<!DOCTYPE html>
<html>
<head>
  <title>Live Card Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: 0.3s;
    }

    body.dark { background:#0f172a; color:white; }
    body.light { background:#f1f5f9; color:black; }
    body.neon { background:black; color:#39ff14; }

    header {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#111827;
      color:white;
    }

    .controls {
      padding:10px;
    }

    input {
      padding:8px;
      width:250px;
    }

    .container {
      height: calc(100vh - 120px);
      overflow-y: auto;
      padding: 10px;
    }

    /* HEADER ROW */
    .headerRow, .cardRow {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 12px;
      align-items: center;
    }

    .headerRow {
      font-weight: bold;
      font-size: 28px;
      border-bottom: 2px solid currentColor;
      position: sticky;
      top: 0;
      background: inherit;
      z-index: 1;
    }

    /* CARD */
    .cardRow {
      font-size: 32px;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    /* NEW ENTRY HIGHLIGHT */
    .new {
      background: rgba(34,197,94,0.25);
      box-shadow: 0 0 15px #22c55e;
      transform: scale(1.02);
    }

    button {
      margin-left: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body class="dark">

<header>
  <div>📡 Card Dashboard</div>

  <div>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('neon')">Neon</button>
  </div>
</header>

<div class="controls">
  🔎 <input id="search" placeholder="Search..." onkeyup="render()" />
</div>

<div class="container" id="container"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx5H1nE9qRgtuvNfEeJZ6GUqnFP9_59sLObLB1FrOZXryB5VwZoaA4EcKkzGE0JaX3f8A/exec";

let rows = [];
let headers = [];
let lastData = "";

function setTheme(t) {
  document.body.className = t;
}

function getOnlyTime(value) {
  if (!value) return "";
  const d = new Date(value);
  if (isNaN(d)) return value;
  return d.toLocaleTimeString();
}

async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const json = await res.json();

    const allRows = json.rows || [];

    headers = allRows[2] || [];     // ✅ ROW 3 = headers
    rows = allRows.slice(3);        // data after row 3

    const newHash = JSON.stringify(rows[0] || []);
    if (newHash === lastData) return;

    lastData = newHash;

    render();

  } catch (err) {
    console.error("API ERROR:", err);
  }
}

function render() {

  const q = document.getElementById("search").value.toLowerCase();
  const container = document.getElementById("container");

  let filtered = rows.filter(r =>
    (r || []).join(" ").toLowerCase().includes(q)
  );

  let html = "";

  /* HEADER */
  html += `<div class="headerRow">`;
  headers.forEach(h => {
    html += `<div>${h || ""}</div>`;
  });
  html += `</div>`;

  /* CARDS */
  filtered.forEach((r, i) => {

    html += `<div class="cardRow ${i === 0 ? 'new' : ''}">`;

    r.forEach((cell, idx) => {

      let value = cell;

      // last column = time only
      if (idx === r.length - 1) {
        value = getOnlyTime(cell);
      }

      html += `<div>${value || ""}</div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

fetchData();
setInterval(fetchData, 1300);

</script>

</body>
</html>
