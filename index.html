<!DOCTYPE html>
<html>
<head>
  <title>LED Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: #39ff14;
      overflow: hidden;
    }

    header {
      padding: 10px;
      background: #111;
      color: white;
      display:flex;
      justify-content:space-between;
    }

    .controls {
      padding: 10px;
    }

    input {
      padding: 8px;
      width: 250px;
      font-size: 18px;
    }

    .ticker {
      height: calc(100vh - 120px);
      overflow-y: auto;
      padding: 10px;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      font-size: 74px;   /* 🔥 LED SIZE */
      line-height: 1.1;
      padding: 10px;
      border-bottom: 2px solid #39ff14;
      text-shadow: 0 0 10px #39ff14;
    }

    .small {
      font-size: 30px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<header>
  <div>📺 LED DISPLAY</div>
</header>

<div class="controls">
  <input id="search" placeholder="Search..." onkeyup="render()" />
</div>

<div class="ticker">
  <div class="feed" id="feed"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx5H1nE9qRgtuvNfEeJZ6GUqnFP9_59sLObLB1FrOZXryB5VwZoaA4EcKkzGE0JaX3f8A/exec";

let rows = [];

async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const json = await res.json();

    rows = json.rows || [];
    render();

  } catch (e) {
    console.error(e);
  }
}

function render() {

  const q = document.getElementById("search").value.toLowerCase();
  const feed = document.getElementById("feed");

  let filtered = rows.filter(r =>
    (r || []).join(" ").toLowerCase().includes(q)
  );

  feed.innerHTML = "";

  filtered.forEach(r => {

    const id = r[0] || "";
    const name = r[1] || "";
    const cls = r[2] || "";
    const status = r[3] || "";
    const time = r[4] || "";

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      ${name}<br>
      <div class="small">
        ${cls} | ${status} | ${time}
      </div>
    `;

    feed.appendChild(div);
  });
}

fetchData();
setInterval(fetchData, 5000);

</script>

</body>
</html>
