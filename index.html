<!DOCTYPE html>
<html>
<head>
  <title>Live Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: 0.3s;
    }

    body.dark { background:#0f172a; color:white; }
    body.light { background:#f1f5f9; color:black; }
    body.neon { background:black; color:#39ff14; }

    header {
      display: flex;
      flex-direction: column;
      padding: 12px 20px;
      background: #111827;
      color: white;
      gap: 10px;
    }

    /* Top bar splitting title layout left and button cluster right */
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    /* Container splitting live time left and search box right */
    .header-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    /* Live Clock Styling */
    .live-clock {
      font-size: 20px;
      font-weight: bold;
      color: #9ca3af; /* Muted gray text color */
      font-family: monospace; /* Keeps layout numbers perfectly fixed in width */
    }

    body.neon .live-clock {
      color: #39ff14; /* Match neon theme colors */
    }

    .controls {
      display: flex;
      justify-content: flex-end;
    }

    input {
      padding: 8px 12px;
      width: 250px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      outline: none;
    }

    body.light input {
      border: 1px solid rgba(0, 0, 0, 0.15);
      background: white;
      color: black;
    }

    body.dark input {
      background: rgba(255,255,255,0.05);
      color: white;
    }

    body.neon input {
      background: black;
      border: 1px solid #39ff14;
      color: #39ff14;
    }

    .container {
      height: calc(100vh - 150px); /* Height balanced for new double-row header */
      overflow-y: auto;
      padding: 10px;
    }

    /* Proportional columns setup */
    .row {
      display: grid;
      grid-template-columns: 0.6fr 1.6fr 0.6fr 1.2fr 1fr; 
      gap: 10px;
      padding: 12px;
      align-items: center;
    }

    .headerRow {
      font-weight: bold;
      font-size: 28px;
      border-bottom: 2px solid currentColor;
      position: sticky;
      top: 0;
      background: inherit;
      z-index: 2;
    }

    .cardRow {
      font-size: 32px;
      margin: 8px 0;
      border-radius: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
    }

    body.light .cardRow {
      background: rgba(0,0,0,0.03);
    }

    /* Dark/Neon Yellow Highlight */
    .new {
      background: rgba(250, 204, 21, 0.35) !important; 
      box-shadow: 0 0 15px #facc15; 
    }

    /* Custom Bright Yellow Highlight exclusive to Light Theme */
    body.light .new {
      background: #fef08a !important; 
      box-shadow: 0 0 14px #eab308;   
      border: 1px solid #facc15;     
      color: #000000 !important;      
    }

    button {
      margin-left: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body class="dark">

<header>
  <div class="header-top">
    <div style="font-size: 26px; font-weight: bold;">📡 Live Dashboard</div>
    <div>
      <button onclick="setTheme('dark')">Dark</button>
      <button onclick="setTheme('light')">Light</button>
      <button onclick="setTheme('neon')">Neon</button>
    </div>
  </div>

  <div class="header-bottom">
    <!-- Live ticking clock goes here on the left side below title -->
    <div class="live-clock" id="liveClock">🕒 --:--:-- --</div>
    
    <div class="controls">
      <input id="search" placeholder="🔎 Search..." onkeyup="render()" />
    </div>
  </div>
</header>

<div class="container" id="container"></div>

<script>

const API = "https://google.com";

let rows = [];
let headers = [];
let lastTopCardSignature = ""; 

function setTheme(t) {
  document.body.className = t;
}

/* Formats data row timestamps */
function getOnlyTime(value) {
  if (!value) return "";
  const d = new Date(value);
  if (isNaN(d)) return value;
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
}

/* 🕒 Live Clock Ticker Updating Every 1 Second */
function updateLiveClock() {
  const now = new Date();
  const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
  document.getElementById("liveClock").innerText = "🕒 " + timeString;
}

/* Play audio when new sheet records drop in */
function playNotificationSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
    gain1.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start();
    osc1.stop(audioCtx.currentTime + 0.1);

    setTimeout(() => {
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(880, audioCtx.currentTime); 
      gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start();
      osc2.stop(audioCtx.currentTime + 0.15);
    }, 80);

  } catch (e) {
    console.error("Audio block verification safety check catch:", e);
  }
}

/* =========================
   FETCH (CLEAN + DIRECT)
========================= */
async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const json = await res.json();

    const allRows = json.rows || [];

    headers = allRows[0] || [];     
    const currentRows = allRows.slice(1);        

    if (currentRows.length > 0) {
      const currentSignature = currentRows[0].join("|");

      if (lastTopCardSignature && lastTopCardSignature !== currentSignature) {
        playNotificationSound();
      }
      lastTopCardSignature = currentSignature;
    }

    rows = currentRows;
    render();

  } catch (err) {
    console.error("API ERROR:", err);
  }
}

/* =========================
   RENDER (NO DUPLICATES)
========================= */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const container = document.getElementById("container");

  const filtered = rows.filter(r =>
    (r || []).join(" ").toLowerCase().includes(q)
  );

  let html = "";

  /* HEADER */
  html += `<div class="row headerRow">`;
  headers.forEach(h => {
    html += `<div>${h || ""}</div>`;
  });
  html += `</div>`;

  /* DATA */
  filtered.forEach((r, i) => {
    html += `<div class="row cardRow ${i === 0 ? 'new' : ''}">`;

    r.forEach((cell, idx) => {
      let value = cell;
      if (idx === r.length - 1) {
        value = getOnlyTime(cell);
      }
      html += `<div>${value || ""}</div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

/* START INTERVAL RUNNERS */
updateLiveClock();
setInterval(updateLiveClock, 1000); // Ticks clock display loop precisely every second

fetchData();
setInterval(fetchData, 1200);

</script>

</body>
</html>
