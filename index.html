<!DOCTYPE html>
<html>
<head>
  <title>Dispersals Live</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: 0.3s;
    }

    body.dark { background:black; color:white; }
    body.light { background:#f1f5f9; color:black; }
    body.neon { background:#030712; color:#39ff14; }

    /* Fix: Centers entry gate as full screen layer without altering flow */
    #audioGate {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0f172a;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }
    
    .gate-logo {
      max-width: 600px;
      height: auto;
      margin-bottom: 30px;
      object-fit: contain;
    }

    #audioGate button {
      background: #facc15;
      color: #0f172a;
      border: none;
      padding: 15px 40px;
      font-size: 22px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 0 20px #facc15;
    }

    header {
      display: flex;
      flex-direction: column;
      padding: 12px 20px;
      background: #111827;
      color: yellow;
      gap: 10px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .header-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .live-clock {
      font-size: 20px;
      font-weight: bold;
      color: #9ca3af; 
      font-family: monospace; 
    }

    body.neon .live-clock { color: #39ff14; }

    .controls { display: flex; justify-content: flex-end; }

    input {
      padding: 8px 12px;
      width: 250px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      outline: none;
    }

    body.light input { border: 1px solid rgba(0, 0, 0, 0.15); background: white; color: black; }
    body.dark input { background: rgba(255,255,255,0.05); color: white; }
    body.neon input { background: black; border: 1px solid #39ff14; color: #39ff14; }

    .container {
      height: calc(100vh - 150px); 
      overflow-y: auto;
      padding: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 0.6fr 2fr 0.8fr 0.6fr 1fr; 
      gap: 4px;
      padding: 8px;
      align-items: center;
    }

    .headerRow {
      font-weight: bold;
      font-size: 36px;
      border-bottom: 2px solid currentColor;
      position: sticky;
      top: 0;
      background: #8B008B;
      z-index: 2;
    }

    .cardRow {
      font-size: 36px;
      margin: 6px 0;
      border-radius: 10px;
      padding: 4px;
      background: rgba(255,255,255,0.05);
    }

    body.light .cardRow { background: rgba(0,0,0,0.03); }

    .new {
      background: rgba(250, 204, 21, 0.35) !important; 
      box-shadow: 0 0 15px #facc15; 
    }

    body.light .new {
      background: #fef08a !important; 
      box-shadow: 0 0 14px #eab308;   
      border: 1px solid #facc15;     
      color: #000000 !important;      
    }

    button {
      margin-left: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }

    select {
  padding:8px 12px;
  border-radius:6px;
  margin-right:8px;
  font-size:16px;
}

body.dark select{
    background:#111;
    color:white;
}

body.light select{
    background:white;
    color:black;
}

body.neon select{
    background:black;
    color:#39ff14;
    border:1px solid #39ff14;
}


    /* ==========================
   ANDROID + LAPTOP RESPONSIVE
========================== */

@media (max-width: 900px) {

  header {
    padding: 10px;
  }

  .header-top {
    flex-direction: column;
    align-items: flex-start;
  }

  .header-top div:first-child {
    font-size: 24px !important;
  }

  .header-bottom {
    flex-direction: column;
    align-items: stretch;
  }

  .controls {
    width: 100%;
    justify-content: flex-start;
  }

  .controls input,
  .controls select {
    width: 100%;
    max-width: none;
  }

  .row {
    grid-template-columns:
      0.5fr
      2fr
      0.8fr
      0.8fr
      1fr;

    font-size: 20px;
  }

  .headerRow {
    font-size: 22px;
  }

  .cardRow {
    font-size: 20px;
  }

}


@media (max-width: 600px) {

  .row {
    grid-template-columns:
      0.4fr
      1.8fr
      0.8fr
      0.8fr
      1fr;

    font-size: 16px;
  }

  .headerRow {
    font-size: 17px;
  }

  .cardRow {
    font-size: 17px;
  }

}
    
  </style>
</head>

<body class="light">

<!-- Unlocks browser sound on screen startup -->
<div id="audioGate">
  <img class="gate-logo" src="https://images.click.in/classifieds/images/163/30_03_2022_16_53_17_cdcfba6b7278a14ccc1a5bf505bfd512_w.png" alt="Podar Logo">
  <div style="font-size: 28px; font-weight: bold;">  Podar International School, Magadi Road - Dispersals Portal </div>
  <div style="font-size: 16px; margin-top: 10px; color: #9ca3af;"> Click the button below to</div>
  <button onclick="unlockAudio()">Proceed Dashboard</button>
</div>

<header>
  <div class="header-top">
    <div style="font-size: 36px; font-weight: bold;">  Podar International School, Magadi Road - Dispersals Live </div>
    <div>
      <button onclick="setTheme('dark')">Dark</button>
      <button onclick="setTheme('light')">Light</button>
      <button onclick="setTheme('neon')">Neon</button>
    </div>
  </div>

  <div class="header-bottom">
    <div class="live-clock" id="liveClock">🕒 --:--:-- -- <span id="connectionStatus">🟡 Checking...</span></div>
    <div class="controls">
  <select id="classFilter" onchange="render()">
    <option value="">All Classes</option>
    <option>I R</option>
    <option>I L</option>
    <option>II R</option>
    <option>II L</option>
    <option>III R</option>
    <option>III L</option>
    <option>IV R</option>
    <option>IV L</option>
    <option>V R</option>
    <option>V L</option>
    <option>VI R</option>
    <option>VI L</option>
    <option>VII R</option>
    <option>VII L</option>
    <option>VIII R</option>
    <option>VIII L</option>
    <option>IX R</option>
    <option>IX L</option>
    <option>X R</option>
    <option>X L</option>
    <option>XI</option>
    <option>XII</option>
  </select>
  <input id="search" placeholder="🔎 Search..." onkeyup="render()" />
</div>
  </div>
</header>

<div class="container" id="container"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx5H1nE9qRgtuvNfEeJZ6GUqnFP9_59sLObLB1FrOZXryB5VwZoaA4EcKkzGE0JaX3f8A/exec";

// Fallback high-compatibility media channel
const fallbackSound = new Audio("https://google.com");

let rows = [];
let headers = [];
let lastConnectionOK = false;
let existingIDsSet = new Set(); 

// Action to hide your startup entry gate when button is clicked
function unlockAudio() {
  document.getElementById("audioGate").style.display = "none";
  playNotificationSound();
}

function setTheme(t) {
  document.body.className = t;
  playNotificationSound(); // Plays structural hardware sound verification pass
}


  function speakStudentName(name) {
  if (!("speechSynthesis" in window)) {
    console.log("Speech not supported");
    return;
  }

  // Cancel any ongoing speech to prevent overlapping queues
  window.speechSynthesis.cancel();

  let count = 0;

  function speakAgain() {
    if (count >= 2) return;

    const msg = new SpeechSynthesisUtterance(name);
    const voices = window.speechSynthesis.getVoices();

    // 1. Search specifically for known Indian female voices
    let femaleIndianVoice = voices.find(v => {
      const nameLower = v.name.toLowerCase();
      const langLower = v.lang.toLowerCase();
      
      // Match Indian English or Hindi/Indian regional languages
      const isIndian = langLower.startsWith("en-in") || langLower.startsWith("hi-in") || nameLower.includes("india");
      
      // Target known female voice names on Windows, macOS, and Android
      const isFemale = nameLower.includes("heera") || 
                       nameLower.includes("veena") || 
                       nameLower.includes("priya") || 
                       nameLower.includes("female") ||
                       nameLower.includes("zira"); // fallback English female

      return isIndian && isFemale;
    });

    // 2. Fallback to any Indian English voice if a specific female one isn't found
    if (!femaleIndianVoice) {
      femaleIndianVoice = voices.find(v => 
        v.lang.startsWith("en-in") || v.name.toLowerCase().includes("india")
      );
    }

    // 3. Apply the voice
    if (femaleIndianVoice) {
      msg.voice = femaleIndianVoice;
    }

    msg.lang = "en-IN";
    msg.rate = 0.70;   // Slightly slower so children's names are pronounced clearly
    msg.pitch = 1.8;   // Slightly higher pitch sounds more naturally female on basic synthesizers
    msg.volume = 3;

    msg.onend = function() {
      count++;
      setTimeout(speakAgain, 600);
    };

    window.speechSynthesis.speak(msg);
  }

  speakAgain();
}

function getOnlyTime(value) {
  if (!value) return "";
  const d = new Date(value);
  if (isNaN(d)) return value;
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
}

function updateLiveClock() {
  const now = new Date();

  const timeString = now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  });

  document.getElementById("liveClock").innerHTML =
    "🕒 " + timeString + 
    ' <span id="connectionStatus">' +
    (lastConnectionOK ? "🟢 Connected" : "🔴 Disconnected") +
    "</span>";
}

/* Dual-Mode Complete Safety Audio Playback Engine */
function playNotificationSound() {
  // Pass 1: Run native high-amplitude hardware square wave generator
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  } catch (e) {
    console.log("Synthesizer bypassed");
  }

  // Pass 2: Simultaneously stream standard container MP3 file down device line
  try {
    fallbackSound.currentTime = 0;
    fallbackSound.volume = 2.0;
    fallbackSound.play();
  } catch (e) {
    console.log("Media channel exception bypass");
  }
}

/* =========================
   FETCH (CLEAN + DIRECT)
========================= */
async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const json = await res.json();
    lastConnectionOK = true;
    updateLiveClock();
    const currentRows = json.rows || [];

    if (currentRows.length > 1) {
      headers = currentRows[0] || [];
      const dataRows = currentRows.slice(1);

      let foundNewID = false;

      dataRows.forEach(row => {
        const rowID = String(row[0] || "").trim();
        
        if (rowID !== "") {
          if (existingIDsSet.size > 0 && !existingIDsSet.has(rowID)) {
            foundNewID = true;
          }
          existingIDsSet.add(rowID);
        }
      });

     if (foundNewID) {

    playNotificationSound();

    const latestRow = dataRows[0];

    const studentName = latestRow[1];

    if(studentName){
        speakStudentName(studentName);
    }
}

      rows = dataRows;
      render();
    }
  } catch (err) {
    lastConnectionOK = false;
    updateLiveClock();
    console.error("API ERROR:", err);
  }
}

/* =========================
   RENDER (NO DUPLICATES)
========================= */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const container = document.getElementById("container");

  const selectedClass = document.getElementById("classFilter").value;

const filtered = rows.filter(r => {

    const matchesSearch =
        (r || []).join(" ").toLowerCase().includes(q);

    const matchesClass =
        selectedClass === "" ||
        String(r[2]).trim() === selectedClass;

    return matchesSearch && matchesClass;
});

  let html = "";

  /* HEADER */
  html += `<div class="row headerRow">`;
  headers.forEach(h => {
    html += `<div>${h || ""}</div>`;
  });
  html += `</div>`;

  /* DATA */
  filtered.forEach((r, i) => {
    html += `<div class="row cardRow ${i === 0 ? 'new' : ''}">`;

    r.forEach((cell, idx) => {
      let value = cell;
      if (idx === r.length - 1) {
        value = getOnlyTime(cell);
      }
      html += `<div>${value || ""}</div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

/* RUN INITIAL TIMERS */
updateLiveClock();
setInterval(updateLiveClock, 1000);

fetchData();
setInterval(fetchData, 1200);

</script>

</body>
</html>
