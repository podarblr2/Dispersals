<!DOCTYPE html>
<html>
<head>
  <title>Live Table Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: 0.3s;
    }

    body.dark {
      background: #0f172a;
      color: white;
    }

    body.light {
      background: #f1f5f9;
      color: black;
    }

    body.neon {
      background: black;
      color: #39ff14;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #111827;
      color: white;
    }

    .controls {
      padding: 10px;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    .table-container {
      height: calc(100vh - 120px);
      overflow: auto;
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 32px;
    }

    th, td {
      border: 1px solid currentColor;
      padding: 12px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      font-size: 36px;
      font-weight: bold;
      position: sticky;
      top: 0;
      background: inherit;
      z-index: 1;
    }

    button {
      margin-left: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body class="dark">

<header>
  <div>📊 Live Table Dashboard</div>

  <div>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('neon')">Neon</button>
  </div>
</header>

<div class="controls">
  🔎 <input id="search" placeholder="Search..." onkeyup="render()" />
</div>

<div class="table-container">
  <table id="table"></table>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx5H1nE9qRgtuvNfEeJZ6GUqnFP9_59sLObLB1FrOZXryB5VwZoaA4EcKkzGE0JaX3f8A/exec";

let rows = [];
let headers = [];

function setTheme(t) {
  document.body.className = t;
}

function getOnlyTime(value) {
  if (!value) return "";
  const d = new Date(value);
  if (isNaN(d)) return value;
  return d.toLocaleTimeString();
}

async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const json = await res.json();

    headers = json.rows?.[0] || [];
    rows = json.rows?.slice(1) || [];

    render();

  } catch (err) {
    console.error("API ERROR:", err);
  }
}

function render() {

  const q = document.getElementById("search").value.toLowerCase();
  const table = document.getElementById("table");

  let filtered = rows.filter(r =>
    (r || []).join(" ").toLowerCase().includes(q)
  );

  let html = "";

  /* HEADER */
  html += "<tr>";
  headers.forEach(h => {
    html += `<th>${h || ""}</th>`;
  });
  html += "</tr>";

  /* DATA */
  filtered.forEach(r => {
    html += "<tr>";

    r.forEach((cell, i) => {
      let value = cell;

      // convert last column (time) nicely if needed
      if (i === r.length - 1) {
        value = getOnlyTime(cell);
      }

      html += `<td>${value || ""}</td>`;
    });

    html += "</tr>";
  });

  table.innerHTML = html;
}

fetchData();

/* 🔥 refresh every 1.3 sec */
setInterval(fetchData, 1300);

</script>

</body>
</html>
