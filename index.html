<!DOCTYPE html>
<html>
<head>
  <title>Live Scrolling Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      overflow: hidden;
      transition: 0.3s;
    }

    body.dark { background:#0f172a; color:white; }
    body.light { background:#f1f5f9; color:black; }
    body.neon { background:black; color:#39ff14; }

    header {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#111827;
      color:white;
      position:sticky;
      top:0;
      z-index:10;
    }

    .controls {
      padding:10px;
    }

    input {
      padding:6px;
      width:200px;
    }

    .ticker {
      height: calc(100vh - 120px);
      overflow: hidden;
      position: relative;
    }

    .feed {
      display: flex;
      flex-direction: column;
    }

    .item {
      padding: 12px;
      margin: 5px;
      border-radius: 8px;
      background: #1e293b;
      border-left: 4px solid #38bdf8;
    }

    .new {
      border-left: 4px solid #22c55e !important;
      box-shadow: 0 0 10px #22c55e;
    }

    @keyframes scrollUp {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
  </style>
</head>

<body class="dark">

<header>
  <div>📡 Live Scrolling Dashboard</div>

  <div>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('neon')">Neon</button>
  </div>
</header>

<div class="controls">
  🔎 <input id="search" placeholder="Search..." onkeyup="render()" />
</div>

<div class="ticker">
  <div class="feed" id="feed"></div>
</div>

<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const API = "https://script.google.com/a/macros/podar.org/s/AKfycbx5H1nE9qRgtuvNfEeJZ6GUqnFP9_59sLObLB1FrOZXryB5VwZoaA4EcKkzGE0JaX3f8A/exec";

let rows = [];
let lastTop = "";

function setTheme(t){
  document.body.className = t;
}

async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const text = await res.text();

    const json = JSON.parse(text);

    rows = json.rows || [];

    // remove empty rows
    rows = rows.filter(r => r && r.some(cell => cell !== ""));

    const latest = JSON.stringify(rows[0] || []);

    if (lastTop && latest !== lastTop) {
      document.getElementById("beep").play();
    }

    lastTop = latest;

    render();

  } catch (err) {
    console.error("Fetch Error:", err);
  }
}

function render() {

  const q = document.getElementById("search").value.toLowerCase();
  const feed = document.getElementById("feed");

  if (!rows.length) {
    feed.innerHTML = "<div class='item'>No Data Found</div>";
    return;
  }

  let filtered = rows.filter(r =>
    (r || []).join(" ").toLowerCase().includes(q)
  );

  feed.innerHTML = "";

  filtered.forEach((r, i) => {

    const div = document.createElement("div");
    div.className = "item";

    const id = r[0] || "";
    const name = r[1] || "No Name";

    if (i === 0) div.classList.add("new");

    div.innerHTML = `
      <b>${name}</b><br>
      <small>${id}</small>
    `;

    feed.appendChild(div);
  });

  // duplicate for smooth scroll effect
  filtered.forEach((r) => {

    const div = document.createElement("div");
    div.className = "item";

    const id = r[0] || "";
    const name = r[1] || "No Name";

    div.innerHTML = `
      <b>${name}</b><br>
      <small>${id}</small>
    `;

    feed.appendChild(div);
  });
}

fetchData();
setInterval(fetchData, 3000);

</script>

</body>
</html>
