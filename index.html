<!DOCTYPE html>
<html>
<head>
  <title>Live Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: 0.3s;
    }

    body.dark { background:#0f172a; color:white; }
    body.light { background:#f1f5f9; color:black; }
    body.neon { background:black; color:#39ff14; }

    /* Audio Unlock Screen Overlay Styling */
    #audioGate {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 23, 42, 0.95);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    #audioGate button {
      background: #facc15;
      color: #0f172a;
      border: none;
      padding: 15px 40px;
      font-size: 22px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 0 20px #facc15;
      transition: 0.2s;
    }

    #audioGate button:hover {
      transform: scale(1.05);
    }

    header {
      display: flex;
      flex-direction: column;
      padding: 12px 20px;
      background: #111827;
      color: white;
      gap: 10px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .header-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .live-clock {
      font-size: 20px;
      font-weight: bold;
      color: #9ca3af; 
      font-family: monospace; 
    }

    body.neon .live-clock { color: #39ff14; }

    .controls { display: flex; justify-content: flex-end; }

    input {
      padding: 8px 12px;
      width: 250px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      outline: none;
    }

    body.light input { border: 1px solid rgba(0, 0, 0, 0.15); background: white; color: black; }
    body.dark input { background: rgba(255,255,255,0.05); color: white; }
    body.neon input { background: black; border: 1px solid #39ff14; color: #39ff14; }

    .container {
      height: calc(100vh - 150px); 
      overflow-y: auto;
      padding: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 0.6fr 1.6fr 0.6fr 1.2fr 1fr; 
      gap: 10px;
      padding: 12px;
      align-items: center;
    }

    .headerRow {
      font-weight: bold;
      font-size: 28px;
      border-bottom: 2px solid currentColor;
      position: sticky;
      top: 0;
      background: inherit;
      z-index: 2;
    }

    .cardRow {
      font-size: 32px;
      margin: 8px 0;
      border-radius: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
    }

    body.light .cardRow { background: rgba(0,0,0,0.03); }

    .new {
      background: rgba(250, 204, 21, 0.35) !important; 
      box-shadow: 0 0 15px #facc15; 
    }

    body.light .new {
      background: #fef08a !important; 
      box-shadow: 0 0 14px #eab308;   
      border: 1px solid #facc15;     
      color: #000000 !important;      
    }

    button {
      margin-left: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body class="dark">

<!-- Unlocks browser sound on screen startup -->
<div id="audioGate">
  <div style="font-size: 28px; font-weight: bold;">  Podar International School, Magadi Road - Dispersals Live </div>
  <div style="font-size: 16px; margin-top: 10px; color: #9ca3af;">Click the button below to authorize the dashboard to play new entry alerts.</div>
  <button onclick="unlockAudio()">Unmute & Start Dashboard</button>
</div>

<header>
  <div class="header-top">
    <div style="font-size: 26px; font-weight: bold;">📡 Live Dashboard</div>
    <div>
      <button onclick="setTheme('dark')">Dark</button>
      <button onclick="setTheme('light')">Light</button>
      <button onclick="setTheme('neon')">Neon</button>
    </div>
  </div>

  <div class="header-bottom">
    <div class="live-clock" id="liveClock">🕒 --:--:-- --</div>
    <div class="controls">
      <input id="search" placeholder="🔎 Search..." onkeyup="render()" />
    </div>
  </div>
</header>

<div class="container" id="container"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx5H1nE9qRgtuvNfEeJZ6GUqnFP9_59sLObLB1FrOZXryB5VwZoaA4EcKkzGE0JaX3f8A/exec";

let rows = [];
let headers = [];
let lastTopCardSignature = ""; 
let globalAudioCtx = null;

function setTheme(t) {
  document.body.className = t;
}

/* Explicitly unlocks the browser sound framework via the overlay screen click */
function unlockAudio() {
  globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  globalAudioCtx.resume().then(() => {
    // Hide the popup screen overlay out of site bounds
    document.getElementById("audioGate").style.display = "none";
    // Play a short startup verification sound to confirm it works
    playNotificationSound();
    
    // Start fetching data AFTER audio context is cleared
    fetchData();
    setInterval(fetchData, 1200);
  });
}

function getOnlyTime(value) {
  if (!value) return "";
  const d = new Date(value);
  if (isNaN(d)) return value;
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
}

function updateLiveClock() {
  const now = new Date();
  const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
  document.getElementById("liveClock").innerText = "🕒 " + timeString;
}

function playNotificationSound() {
  if (!globalAudioCtx) return;
  if (globalAudioCtx.state === 'suspended') {
    globalAudioCtx.resume();
  }

  try {
    const osc1 = globalAudioCtx.createOscillator();
    const gain1 = globalAudioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(587.33, globalAudioCtx.currentTime); 
    gain1.gain.setValueAtTime(0.1, globalAudioCtx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.001, globalAudioCtx.currentTime + 0.1);
    osc1.connect(gain1);
    gain1.connect(globalAudioCtx.destination);
    osc1.start();
    osc1.stop(globalAudioCtx.currentTime + 0.1);

    setTimeout(() => {
      if (!globalAudioCtx) return;
      const osc2 = globalAudioCtx.createOscillator();
      const gain2 = globalAudioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(880, globalAudioCtx.currentTime); 
      gain2.gain.setValueAtTime(0.1, globalAudioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001, globalAudioCtx.currentTime + 0.15);
      osc2.connect(gain2);
      gain2.connect(globalAudioCtx.destination);
      osc2.start();
      osc2.stop(globalAudioCtx.currentTime + 0.15);
    }, 80);

  } catch (e) {
    console.error("Audio block verification check failure code trace:", e);
  }
}

/* =========================
   FETCH (CLEAN + DIRECT)
========================= */
async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const json = await res.json();

    const allRows = json.rows || [];

    headers = allRows[0] || [];     
    const currentRows = allRows.slice(1);        

    if (currentRows.length > 0) {
      // Build string identification using the row values of the FIRST item
      const currentSignature = currentRows[0].join("|");

      // ⚠️ CRITICAL FIX: Only play sound if lastTopCardSignature ALREADY had a sheet value
      // This prevents a false sound alarm when loading the page for the first time
      if (lastTopCardSignature && lastTopCardSignature !== currentSignature) {
        playNotificationSound();
      }
      lastTopCardSignature = currentSignature;
    }

    rows = currentRows;
    render();

  } catch (err) {
    console.error("API ERROR:", err);
  }
}

/* =========================
   RENDER (NO DUPLICATES)
========================= */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const container = document.getElementById("container");

  const filtered = rows.filter(r =>
    (r || []).join(" ").toLowerCase().includes(q)
  );

  let html = "";

  /* HEADER */
  html += `<div class="row headerRow">`;
  headers.forEach(h => {
    html += `<div>${h || ""}</div>`;
  });
  html += `</div>`;

  /* DATA */
  filtered.forEach((r, i) => {
    html += `<div class="row cardRow ${i === 0 ? 'new' : ''}">`;

    r.forEach((cell, idx) => {
      let value = cell;
      if (idx === r.length - 1) {
        value = getOnlyTime(cell);
      }
      html += `<div>${value || ""}</div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

/* RUN INITIAL TIMERS */
updateLiveClock();
setInterval(updateLiveClock, 1000);

// Notice: API fetch loop functions moved inside unlockAudio() to protect thread timings!

</script>

</body>
</html>
