<!DOCTYPE html>
<html>
<head>
  <title>Live Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      overflow: hidden;
      transition: 0.3s;
    }

    body.dark { background:#0f172a; color:white; }
    body.light { background:#f1f5f9; color:black; }
    body.neon { background:black; color:#39ff14; }

    header {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#111827;
      color:white;
    }

    .controls {
      padding:10px;
    }

    input {
      padding:6px;
      width:220px;
    }

    .ticker {
      height: calc(100vh - 120px);
      overflow: hidden;
    }

    .feed {
      display:flex;
      flex-direction:column;
    }

    .item {
      padding:12px;
      margin:5px;
      border-radius:8px;
      background:#1e293b;
      border-left:4px solid #38bdf8;
    }

    .new {
      border-left:4px solid #22c55e;
      box-shadow:0 0 10px #22c55e;
    }
  </style>
</head>

<body class="dark">

<header>
  <div>📡 Live Dashboard</div>

  <div>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('neon')">Neon</button>
  </div>
</header>

<div class="controls">
  🔎 <input id="search" placeholder="Search..." onkeyup="render()" />
</div>

<div class="ticker">
  <div class="feed" id="feed"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";

let rows = [];
let lastTop = "";

function setTheme(t) {
  document.body.className = t;
}

async function fetchData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const text = await res.text();

    const json = JSON.parse(text);

    rows = json.rows || [];

    render();

  } catch (err) {
    console.error("FETCH ERROR:", err);
    document.getElementById("feed").innerHTML =
      "<div class='item'>API ERROR - Check Console</div>";
  }
}

function render() {

  const q = document.getElementById("search").value.toLowerCase();
  const feed = document.getElementById("feed");

  if (!rows.length) {
    feed.innerHTML = "<div class='item'>No Data Found</div>";
    return;
  }

  let filtered = rows.filter(r =>
    (r || []).join(" ").toLowerCase().includes(q)
  );

  feed.innerHTML = "";

  filtered.forEach((r, i) => {

    const div = document.createElement("div");
    div.className = "item";

    if (i === 0) div.classList.add("new");

    div.innerHTML = `
      <b>${r[1] || "No Name"}</b><br>
      <small>ID: ${r[0] || ""}</small>
    `;

    feed.appendChild(div);
  });
}

fetchData();
setInterval(fetchData, 3000);

</script>

</body>
</html>
